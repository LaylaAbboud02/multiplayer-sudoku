<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Sudoku</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Multiplayer Sudoku</h1>
    <p>Create a room or join one with a code.</p>

    {{if .Error}}
      <p class="error-message">{{.Error}}</p>
    {{end}}

    <div class="menu-card">
      <form action="/create-room" method="POST">
        <button type="submit" class="menu-button">Create Room</button>
      </form>

      <form action="/join-room" method="POST" class="join-form">
        <input
          type="text"
          name="room_id"
          placeholder="Enter room code"
          class="room-input"
        />
        <button type="submit" class="menu-button">Join Room</button>
      </form>
    </div>
  </main>
</body>
</html>
